<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg-world" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(-1 0.5 0.5)">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0d505a" />
    </linearGradient>
    <linearGradient id="sheen-world" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="blur-world" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <pattern id="dots-world" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.16" />
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg-world)" />
  <g><circle cx="502.4" cy="340.2" r="199.3" fill="#ffffff" opacity="0.15" filter="url(#blur-world)" />
    <circle cx="143.4" cy="81.8" r="146.8" fill="#6fe2f4" opacity="0.19" filter="url(#blur-world)" />
    <circle cx="473.0" cy="241.8" r="156.5" fill="#ffffff" opacity="0.14" filter="url(#blur-world)" /></g>
  <circle cx="-39.4" cy="54.4" r="138.7" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" />
  <circle cx="-39.4" cy="54.4" r="99.9" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" />
  <rect width="800" height="450" fill="url(#dots-world)" />
  <rect width="800" height="450" fill="url(#sheen-world)" />
  <rect width="800" height="450" fill="none" stroke="#137483" stroke-opacity="0.25" stroke-width="2" />
</svg>
