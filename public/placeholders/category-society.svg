<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg-society" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(1 0.5 0.5)">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#5d3c04" />
    </linearGradient>
    <linearGradient id="sheen-society" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="blur-society" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <pattern id="dots-society" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.16" />
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg-society)" />
  <g><circle cx="122.2" cy="171.9" r="135.8" fill="#ffffff" opacity="0.16" filter="url(#blur-society)" />
    <circle cx="672.0" cy="334.6" r="195.8" fill="#f9c060" opacity="0.14" filter="url(#blur-society)" />
    <circle cx="133.8" cy="70.9" r="151.2" fill="#ffffff" opacity="0.16" filter="url(#blur-society)" /></g>
  <circle cx="865.6" cy="40.9" r="206.6" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" />
  <circle cx="865.6" cy="40.9" r="148.7" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" />
  <rect width="800" height="450" fill="url(#dots-society)" />
  <rect width="800" height="450" fill="url(#sheen-society)" />
  <rect width="800" height="450" fill="none" stroke="#875706" stroke-opacity="0.25" stroke-width="2" />
</svg>
