<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg-economy" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(-8 0.5 0.5)">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#064631" />
    </linearGradient>
    <linearGradient id="sheen-economy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="blur-economy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <pattern id="dots-economy" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.16" />
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg-economy)" />
  <g><circle cx="218.2" cy="313.8" r="221.7" fill="#ffffff" opacity="0.17" filter="url(#blur-economy)" />
    <circle cx="120.3" cy="208.5" r="160.3" fill="#64d2ad" opacity="0.16" filter="url(#blur-economy)" />
    <circle cx="539.5" cy="156.0" r="197.4" fill="#ffffff" opacity="0.19" filter="url(#blur-economy)" /></g>
  <circle cx="784.2" cy="234.5" r="210.0" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" />
  <circle cx="784.2" cy="234.5" r="151.2" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" />
  <rect width="800" height="450" fill="url(#dots-economy)" />
  <rect width="800" height="450" fill="url(#sheen-economy)" />
  <rect width="800" height="450" fill="none" stroke="#096647" stroke-opacity="0.25" stroke-width="2" />
</svg>
