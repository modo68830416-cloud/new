<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg-breaking" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(3 0.5 0.5)">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#5b1a1a" />
    </linearGradient>
    <linearGradient id="sheen-breaking" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="blur-breaking" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <pattern id="dots-breaking" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.16" />
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg-breaking)" />
  <g><circle cx="674.6" cy="329.9" r="209.6" fill="#ffffff" opacity="0.19" filter="url(#blur-breaking)" />
    <circle cx="300.2" cy="132.3" r="216.4" fill="#f58585" opacity="0.23" filter="url(#blur-breaking)" />
    <circle cx="401.9" cy="198.6" r="158.3" fill="#ffffff" opacity="0.14" filter="url(#blur-breaking)" /></g>
  <circle cx="-7.6" cy="90.9" r="185.6" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" />
  <circle cx="-7.6" cy="90.9" r="133.6" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" />
  <rect width="800" height="450" fill="url(#dots-breaking)" />
  <rect width="800" height="450" fill="url(#sheen-breaking)" />
  <rect width="800" height="450" fill="none" stroke="#832525" stroke-opacity="0.25" stroke-width="2" />
</svg>
