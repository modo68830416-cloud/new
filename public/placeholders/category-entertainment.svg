<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg-entertainment" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(-15 0.5 0.5)">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#521b5b" />
    </linearGradient>
    <linearGradient id="sheen-entertainment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="blur-entertainment" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <pattern id="dots-entertainment" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.16" />
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg-entertainment)" />
  <g><circle cx="365.4" cy="340.8" r="149.2" fill="#ffffff" opacity="0.15" filter="url(#blur-entertainment)" />
    <circle cx="311.0" cy="81.1" r="162.2" fill="#e687f5" opacity="0.14" filter="url(#blur-entertainment)" />
    <circle cx="569.0" cy="69.6" r="102.5" fill="#ffffff" opacity="0.18" filter="url(#blur-entertainment)" /></g>
  <circle cx="801.3" cy="59.0" r="202.3" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" />
  <circle cx="801.3" cy="59.0" r="145.6" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" />
  <rect width="800" height="450" fill="url(#dots-entertainment)" />
  <rect width="800" height="450" fill="url(#sheen-entertainment)" />
  <rect width="800" height="450" fill="none" stroke="#772783" stroke-opacity="0.25" stroke-width="2" />
</svg>
