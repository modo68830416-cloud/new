<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg-industry" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(-15 0.5 0.5)">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#31355e" />
    </linearGradient>
    <linearGradient id="sheen-industry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="blur-industry" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <pattern id="dots-industry" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.16" />
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg-industry)" />
  <g><circle cx="391.0" cy="126.3" r="170.2" fill="#ffffff" opacity="0.14" filter="url(#blur-industry)" />
    <circle cx="570.9" cy="165.6" r="189.1" fill="#adb4fa" opacity="0.17" filter="url(#blur-industry)" />
    <circle cx="261.8" cy="248.4" r="129.1" fill="#ffffff" opacity="0.22" filter="url(#blur-industry)" /></g>
  <circle cx="4.5" cy="263.3" r="166.8" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" />
  <circle cx="4.5" cy="263.3" r="120.1" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5" />
  <rect width="800" height="450" fill="url(#dots-industry)" />
  <rect width="800" height="450" fill="url(#sheen-industry)" />
  <rect width="800" height="450" fill="none" stroke="#474d88" stroke-opacity="0.25" stroke-width="2" />
</svg>
